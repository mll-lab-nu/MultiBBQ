# Inference environment for MultiBBQ (Linux + NVIDIA GPU; wheels target CUDA 12.4).
# The metric pipeline does not need this env: a plain `pip install -e .` is enough.
#
# Two packages install separately, after `conda activate multibbq`:
#   pip install flash-attn==2.7.4.post1 --no-build-isolation   # builds against the installed torch
#   (DeepSeek-VL only) pip install git+https://github.com/deepseek-ai/DeepSeek-VL
# The Imagen-4-Ultra regeneration notebook additionally needs `pip install google-cloud-aiplatform`.
name: multibbq
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - ipykernel # only needed to run the notebooks
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.6.0+cu124
      - torchvision==0.21.0+cu124
      - transformers==4.55.4
      - accelerate==1.10.1
      - autoawq==0.2.9 # quantization study (quant experiment)
      - bitsandbytes==0.47.0 # 4/8-bit quantization backends
      - qwen-vl-utils==0.0.11 # Qwen2.5-VL
      - timm==1.0.19 # InternVL
      - einops==0.8.1
      - sentencepiece==0.2.1
      - openai==1.102.0 # GPT-4o / GPT-5 API models
      - google-genai==1.32.0 # Gemini via Vertex AI
      - pillow==11.3.0
      - pandas==2.3.2
      - numpy==2.2.6
      - tqdm==4.67.1
      - datasets==4.0.0 # `multibbq download` / parquet extraction
      - huggingface_hub>=0.34 # provides the `hf` CLI
      - pyarrow==21.0.0
